<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
   <h1>PathFinding Visualizing Tool!</h1>
   <label for="alg">Pick an Alogorithm:</label>

<select name="alg" id="alg">
  <option value="BFS">BFS</option>
   <option value="A*">A*</option>
  <option value="none">none😊</option>
</select>
<br>
<br>
<label for="size">Pick a size:</label>

<div class="controls">
    <label>Rows: <input type="number" id="rowsInput" value="20"></label>
    <label>Cols: <input type="number" id="colsInput" value="20"></label>
    <button onclick="resizeGrid()">Resize Grid</button>

    <br><br>

    <button onclick="mode='start'">Move Start</button>
    <button onclick="mode='goal'">Move Goal</button>
    <button onclick="mode='wall'">Draw Wall</button>

    <br><br>

    <button onclick="run()">Run BFS</button>
    <button onclick="clearGrid()">Clear Path</button>
</div>

<div id="grid"></div>

<script src="scripts.js"></script>
</body>
</html>
